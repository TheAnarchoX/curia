[project]
name = "curia-connectors-ibabs"
version = "0.1.0"
description = "iBabs connector for Curia ingestion pipeline"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Curia Team" }]
dependencies = [
    "curia-domain",
    "curia-ingestion",
    "beautifulsoup4>=4.12,<5",
    "lxml>=5.0,<6",
    "httpx>=0.27,<1",
    "pydantic>=2,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
curia-domain = { workspace = true }
curia-ingestion = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["curia_connectors_ibabs"]
