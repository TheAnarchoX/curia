[project]
name = "curia-connectors-ori"
version = "0.1.0"
description = "OpenRaadsinformatie (Open Council Data) connector for Curia"
license = "MIT"
requires-python = ">=3.12"
authors = [{ name = "Curia Team" }]
dependencies = [
    "curia-domain",
    "curia-ingestion",
    "httpx>=0.27,<1",
    "pydantic>=2,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
curia-domain = { workspace = true }
curia-ingestion = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["curia_connectors_ori"]
