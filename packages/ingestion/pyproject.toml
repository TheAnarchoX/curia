[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "curia-ingestion"
version = "0.1.0"
description = "Curia ingestion layer – crawling, parsing, and snapshot storage"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "curia-domain",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]
