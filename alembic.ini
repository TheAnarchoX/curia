# A generic, single database configuration.

[alembic]
# Path to migration scripts.
script_location = migrations

# Template used to generate migration file names.
file_template = %%(rev)s_%%(slug)s

# Timezone to use when rendering the date within the migration file
# as well as the filename.
timezone = UTC

# Max length of characters to apply to the "slug" field.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions directory.
sourceless = false

# Version path separator; as mentioned above, this is around whether
# "version_locations" entries use : or ; to separate individual values.
version_path_separator = os

# SQLAlchemy URL — override via CURIA_DATABASE_URL env variable.
sqlalchemy.url = postgresql+asyncpg://curia:curia@localhost:5432/curia

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
